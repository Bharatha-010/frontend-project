<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    /* @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap'); */

    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{
      height: 100vh;               
     display: flex;               
    justify-content: center;     
    align-items: center;  
     max-width: 1440px;
     margin: auto;
     box-sizing: border-box;
     background-color: #d6e2f0;
    }
    .card{
     background-color:  hsl(0, 0%, 100%);
     height: 400px;
     width: 250px;
     padding: 10px;
     border-radius: 1rem;
     text-align: center;
    font-family: "Outfit", sans-serif;
 
    }
    img{
      border-radius: 0.9rem;
      
    }
    .heading{
      font-weight: 700;
      padding: 0px 20px;
      
    }
    .text{
      color:  hsl(216, 15%, 48%);
      font-size: 13px;
      padding: 0px 10px 0px 20px;
    }
    
    @media screen and (max-width:400px){
     
    }
   
  </style>
</head>
<body>

  <div class="card">
  
  <img src="images/image-qr-code.png" alt="qrcode" width="250px" height="250px">
  <div>
   
  <p class="heading">Improve your front-end skills by building projects</p>

<p class="text">
  Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
  
  </div>

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">bharathapriyan</a>.
  </div> -->
</body>
</html>
